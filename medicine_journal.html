<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>戒菸藥物日誌</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --card-bg: #ffffff;
      --card-border: rgba(0,0,0,0.08);
      --body-bg: #f0fdf4;
      --text-primary: #1f2937;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --green: #059669;
      --green-light: #d1fae5;
      --green-dark: #065f46;
      --teal: #0d9488;
      --teal-light: #ccfbf1;
      --pink: #db2777;
      --pink-light: #fce7f3;
      --rose-light: #fff1f2;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --card-bg: #1a2e25;
        --card-border: rgba(255,255,255,0.08);
        --body-bg: #0f1f18;
        --text-primary: #f3f4f6;
        --text-secondary: #9ca3af;
        --text-muted: #6b7280;
      }
    }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--body-bg);
      min-height: 100vh;
      padding: 1.5rem 1rem 4rem;
    }

    .app { max-width: 500px; margin: 0 auto; }

    /* Header */
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 24px; font-weight: 900; color: var(--text-primary); }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 4px; }

    /* Card */
    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 1.25rem;
      margin-bottom: 1rem;
      box-shadow: 0 2px 12px rgba(5,150,105,0.08);
    }

    .section-title {
      font-size: 13px; font-weight: 800;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 0.9rem;
      display: flex; align-items: center; gap: 6px;
    }

    /* Form elements */
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }

    label {
      display: block;
      font-size: 13px; font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="date"],
    textarea {
      width: 100%;
      border: 1.5px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: 'Nunito', sans-serif;
      font-weight: 600;
      color: var(--text-primary);
      background: var(--body-bg);
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="date"]:focus,
    textarea:focus { border-color: var(--green); }

    textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    /* Drug chips */
    .chip-group { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1.5px solid rgba(0,0,0,0.1);
      font-size: 13px; font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--body-bg);
      color: var(--text-secondary);
      font-family: 'Nunito', sans-serif;
    }

    .chip:hover { border-color: var(--green); color: var(--green); }
    .chip.selected { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }

    /* Regular use toggle */
    .toggle-row { display: flex; gap: 10px; }

    .toggle-btn {
      flex: 1; padding: 10px;
      border-radius: 12px;
      border: 1.5px solid rgba(0,0,0,0.1);
      font-size: 14px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      background: var(--body-bg);
      color: var(--text-secondary);
      font-family: 'Nunito', sans-serif;
      text-align: center;
    }

    .toggle-btn.yes.selected { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
    .toggle-btn.no.selected  { background: #fee2e2; border-color: #ef4444; color: #991b1b; }

    /* Side effects */
    .side-effect-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

    .se-item {
      border: 1.5px solid rgba(0,0,0,0.08);
      border-radius: 14px;
      padding: 10px 12px;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--body-bg);
    }

    .se-item:hover { border-color: #f9a8d4; }
    .se-item.selected { background: var(--pink-light); border-color: var(--pink); }

    .se-top { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
    .se-emoji { font-size: 20px; }
    .se-name { font-size: 13px; font-weight: 700; color: var(--text-primary); }

    .se-item.selected .se-name { color: var(--pink); }

    /* Severity dots */
    .severity-row { display: flex; gap: 5px; }

    .dot-btn {
      width: 22px; height: 22px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.1);
      cursor: pointer; transition: all 0.2s;
      background: var(--body-bg);
      font-size: 0;
    }

    .dot-btn.active-1 { background: #fef9c3; border-color: #d97706; }
    .dot-btn.active-2 { background: #fed7aa; border-color: #ea580c; }
    .dot-btn.active-3 { background: #fecaca; border-color: #dc2626; }

    .severity-label { font-size: 11px; color: var(--text-muted); margin-top: 3px; font-weight: 600; }

    /* Submit button */
    .btn-submit {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: none;
      background: linear-gradient(135deg, #059669, #0d9488);
      color: #fff;
      font-size: 16px; font-weight: 800;
      font-family: 'Nunito', sans-serif;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(5,150,105,0.3);
      margin-top: 0.5rem;
    }

    .btn-submit:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(5,150,105,0.4); }
    .btn-submit:active { transform: scale(0.98); }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
      background: #1f2937; color: #fff;
      font-size: 13px; font-weight: 700;
      padding: 10px 22px; border-radius: 30px;
      z-index: 9999; font-family: 'Nunito', sans-serif;
      transition: opacity 0.3s; opacity: 0;
      white-space: nowrap;
    }

    /* Date badge */
    .date-badge {
      display: inline-block;
      background: var(--green-light); color: var(--green-dark);
      font-size: 12px; font-weight: 800;
      padding: 4px 14px; border-radius: 20px; margin-top: 6px;
    }

    /* Records */
    .record-item {
      background: var(--body-bg);
      border-radius: 14px; padding: 12px;
      margin-bottom: 8px; border: 1px solid var(--card-border);
    }

    .record-item:last-child { margin-bottom: 0; }
    .record-date { font-size: 12px; font-weight: 700; color: var(--green); margin-bottom: 4px; }
    .record-name { font-size: 14px; font-weight: 800; color: var(--text-primary); }
    .record-detail { font-size: 12px; color: var(--text-secondary); margin-top: 3px; }

    .empty-msg { font-size: 13px; color: var(--text-muted); text-align: center; padding: 12px 0; }

    .tab-row { display: flex; gap: 8px; margin-bottom: 1rem; }
    .tab-btn {
      flex: 1; padding: 9px;
      border-radius: 12px; border: 1.5px solid var(--card-border);
      font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
      background: var(--card-bg); color: var(--text-secondary);
      font-family: 'Nunito', sans-serif;
    }
    .tab-btn.active { background: var(--green-light); border-color: var(--green); color: var(--green-dark); }
  </style>
</head>
<body>

<div class="app">

  <div class="header">
    <div style="font-size: 36px; margin-bottom: 6px;">💊</div>
    <h1>戒菸藥物日誌</h1>
    <p>記錄每日用藥狀況，守護健康！</p>
    <div class="date-badge" id="dateBadge"></div>
  </div>

  <!-- Tab 切換 -->
  <div class="tab-row">
    <button class="tab-btn active" id="tabForm" onclick="switchTab('form')">📝 填寫日誌</button>
    <button class="tab-btn" id="tabHistory" onclick="switchTab('history')">📋 歷史紀錄</button>
  </div>

  <!-- 填寫表單 -->
  <div id="sectionForm">

    <!-- 基本資料 -->
    <div class="card">
      <div class="section-title">👤 基本資料</div>
      <div class="field">
        <label>姓名</label>
        <input type="text" id="userName" placeholder="請輸入姓名" />
      </div>
      <div class="field">
        <label>身分證字號</label>
        <input type="text" id="userId" placeholder="請輸入身分證字號" maxlength="10" />
      </div>
      <div class="field">
        <label>填寫日期</label>
        <input type="date" id="recordDate" />
      </div>
    </div>

    <!-- 使用藥物 -->
    <div class="card">
      <div class="section-title">💊 使用藥物</div>
      <div class="chip-group" id="drugGroup">
        <div class="chip" onclick="toggleChip(this, 'drug')">咀嚼錠</div>
        <div class="chip" onclick="toggleChip(this, 'drug')">貼片</div>
        <div class="chip" onclick="toggleChip(this, 'drug')">口服藥</div>
        <div class="chip" onclick="toggleChip(this, 'drug')">其他</div>
      </div>
    </div>

    <!-- 規律用藥 -->
    <div class="card">
      <div class="section-title">✅ 是否規律使用藥物</div>
      <div class="toggle-row">
        <button class="toggle-btn yes" id="toggleYes" onclick="toggleRegular(true)">✅ 有規律使用</button>
        <button class="toggle-btn no"  id="toggleNo"  onclick="toggleRegular(false)">❌ 沒有規律使用</button>
      </div>
    </div>

    <!-- 副作用 -->
    <div class="card">
      <div class="section-title">⚠️ 副作用程度</div>
      <div class="side-effect-grid">

        <div class="se-item" id="se-nausea" onclick="toggleSE('nausea', this)">
          <div class="se-top"><span class="se-emoji">🤢</span><span class="se-name">噁心</span></div>
          <div class="severity-row" id="sev-nausea">
            <div class="dot-btn" onclick="setSeverity(event,'nausea',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'nausea',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'nausea',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

        <div class="se-item" id="se-sleep" onclick="toggleSE('sleep', this)">
          <div class="se-top"><span class="se-emoji">😴</span><span class="se-name">睡眠品質差</span></div>
          <div class="severity-row" id="sev-sleep">
            <div class="dot-btn" onclick="setSeverity(event,'sleep',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'sleep',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'sleep',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

        <div class="se-item" id="se-dry" onclick="toggleSE('dry', this)">
          <div class="se-top"><span class="se-emoji">🌵</span><span class="se-name">口乾舌燥</span></div>
          <div class="severity-row" id="sev-dry">
            <div class="dot-btn" onclick="setSeverity(event,'dry',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'dry',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'dry',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

        <div class="se-item" id="se-dizzy" onclick="toggleSE('dizzy', this)">
          <div class="se-top"><span class="se-emoji">💫</span><span class="se-name">頭暈</span></div>
          <div class="severity-row" id="sev-dizzy">
            <div class="dot-btn" onclick="setSeverity(event,'dizzy',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'dizzy',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'dizzy',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

        <div class="se-item" id="se-skin" onclick="toggleSE('skin', this)">
          <div class="se-top"><span class="se-emoji">🔴</span><span class="se-name">皮膚紅腫</span></div>
          <div class="severity-row" id="sev-skin">
            <div class="dot-btn" onclick="setSeverity(event,'skin',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'skin',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'skin',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

        <div class="se-item" id="se-mood" onclick="toggleSE('mood', this)">
          <div class="se-top"><span class="se-emoji">😤</span><span class="se-name">情緒波動</span></div>
          <div class="severity-row" id="sev-mood">
            <div class="dot-btn" onclick="setSeverity(event,'mood',1)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'mood',2)"></div>
            <div class="dot-btn" onclick="setSeverity(event,'mood',3)"></div>
          </div>
          <div class="severity-label">輕 ── 中 ── 重</div>
        </div>

      </div>
    </div>

    <!-- 額外副作用 -->
    <div class="card">
      <div class="section-title">📝 額外的副作用</div>
      <textarea id="extraSE" placeholder="請描述其他副作用狀況（如有）"></textarea>
    </div>

    <!-- 回診備忘錄 -->
    <div class="card">
      <div class="section-title">🏥 回診備忘錄</div>
      <textarea id="memo" placeholder="記下想問醫生的問題，例如：藥物劑量調整、副作用處理方式…"></textarea>
    </div>

    <button class="btn-submit" onclick="submitForm()">💾 儲存日誌</button>

  </div>

  <!-- 歷史紀錄 -->
  <div id="sectionHistory" style="display:none;">
    <div class="card">
      <div class="section-title">📋 過去紀錄</div>
      <div id="historyList"><div class="empty-msg">尚無紀錄</div></div>
    </div>
    <button class="btn-submit" style="background: linear-gradient(135deg,#dc2626,#db2777); box-shadow: 0 4px 16px rgba(220,38,38,0.3);" onclick="clearHistory()">🗑️ 清除所有紀錄</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbwp1oTzThgqVJ1rNH9GGq6ZTOQDlO63Fyx8XkUFaEV_JyuRMisS2uPYqK3S_iIN8TmK/exec"; // 如有 GAS 網址請填入

  const seState = { nausea:0, sleep:0, dry:0, dizzy:0, skin:0, mood:0 };
  let regularUse = null;
  const seNames = { nausea:'噁心', sleep:'睡眠品質差', dry:'口乾舌燥', dizzy:'頭暈', skin:'皮膚紅腫', mood:'情緒波動' };
  const sevText = ['', '輕微', '中等', '嚴重'];

  // 設定今天日期
  const today = new Date();
  document.getElementById('recordDate').value = today.toISOString().split('T')[0];
  const opts = { year:'numeric', month:'long', day:'numeric', weekday:'long' };
  document.getElementById('dateBadge').textContent = today.toLocaleDateString('zh-TW', opts);

  function switchTab(tab) {
    document.getElementById('sectionForm').style.display    = tab === 'form'    ? 'block' : 'none';
    document.getElementById('sectionHistory').style.display = tab === 'history' ? 'block' : 'none';
    document.getElementById('tabForm').classList.toggle('active',    tab === 'form');
    document.getElementById('tabHistory').classList.toggle('active', tab === 'history');
    if (tab === 'history') renderHistory();
  }

  function toggleChip(el, group) {
    el.classList.toggle('selected');
  }

  function toggleRegular(val) {
    regularUse = val;
    document.getElementById('toggleYes').classList.toggle('selected', val === true);
    document.getElementById('toggleNo').classList.toggle('selected',  val === false);
  }

  function toggleSE(key, el) {
    el.classList.toggle('selected');
    if (!el.classList.contains('selected')) {
      seState[key] = 0;
      updateDots(key);
    }
  }

  function setSeverity(e, key, level) {
    e.stopPropagation();
    seState[key] = level;
    document.getElementById('se-' + key).classList.add('selected');
    updateDots(key);
  }

  function updateDots(key) {
    const dots = document.querySelectorAll('#sev-' + key + ' .dot-btn');
    const level = seState[key];
    dots.forEach((d, i) => {
      d.className = 'dot-btn';
      if (i < level) d.classList.add('active-' + level);
    });
  }

  function submitForm() {
    const name   = document.getElementById('userName').value.trim();
    const userId = document.getElementById('userId').value.trim();
    const date   = document.getElementById('recordDate').value;

    if (!name)   { showToast('⚠️ 請填寫姓名'); return; }
    if (!userId) { showToast('⚠️ 請填寫身分證字號'); return; }
    if (!date)   { showToast('⚠️ 請選擇日期'); return; }

    const drugs = [...document.querySelectorAll('#drugGroup .chip.selected')].map(c => c.textContent);
    const seList = Object.entries(seState)
      .filter(([k, v]) => v > 0)
      .map(([k, v]) => seNames[k] + '（' + sevText[v] + '）');

    const record = {
      name, userId, date,
      drugs: drugs.join('、') || '未選擇',
      regular: regularUse === null ? '未填寫' : regularUse ? '規律使用' : '未規律使用',
      sideEffects: seList.length > 0 ? seList.join('、') : '無',
      extraSE: document.getElementById('extraSE').value.trim() || '無',
      memo: document.getElementById('memo').value.trim() || '無',
      savedAt: new Date().toLocaleString('zh-TW')
    };

    // 存入 localStorage
    const records = JSON.parse(localStorage.getItem('medicineJournal') || '[]');
    records.unshift(record);
    localStorage.setItem('medicineJournal', JSON.stringify(records));

    // 送到 GAS（如有設定）
    if (GAS_URL) {
      fetch(GAS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(record)
      });
    }

    showToast('✅ 日誌已儲存！');
    resetForm();
  }

  function resetForm() {
    document.getElementById('userName').value = '';
    document.getElementById('userId').value = '';
    document.getElementById('extraSE').value = '';
    document.getElementById('memo').value = '';
    document.querySelectorAll('.chip.selected').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.se-item.selected').forEach(c => c.classList.remove('selected'));
    document.querySelectorAll('.toggle-btn.selected').forEach(c => c.classList.remove('selected'));
    Object.keys(seState).forEach(k => { seState[k] = 0; updateDots(k); });
    regularUse = null;
    document.getElementById('recordDate').value = today.toISOString().split('T')[0];
  }

  function renderHistory() {
    const records = JSON.parse(localStorage.getItem('medicineJournal') || '[]');
    const list = document.getElementById('historyList');
    if (records.length === 0) {
      list.innerHTML = '<div class="empty-msg">尚無紀錄</div>';
      return;
    }
    list.innerHTML = records.map(r =>
      '<div class="record-item">' +
        '<div class="record-date">📅 ' + r.date + '　儲存於 ' + r.savedAt + '</div>' +
        '<div class="record-name">👤 ' + r.name + '</div>' +
        '<div class="record-detail">💊 藥物：' + r.drugs + '</div>' +
        '<div class="record-detail">✅ 規律用藥：' + r.regular + '</div>' +
        '<div class="record-detail">⚠️ 副作用：' + r.sideEffects + '</div>' +
        (r.extraSE !== '無' ? '<div class="record-detail">📝 額外副作用：' + r.extraSE + '</div>' : '') +
        (r.memo !== '無' ? '<div class="record-detail">🏥 回診備忘：' + r.memo + '</div>' : '') +
      '</div>'
    ).join('');
  }

  function clearHistory() {
    if (!confirm('確定要清除所有紀錄嗎？')) return;
    localStorage.removeItem('medicineJournal');
    renderHistory();
    showToast('🗑️ 已清除所有紀錄');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.style.opacity = '1';
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.style.opacity = '0'; }, 2500);
  }
</script>
</body>
</html>
